<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>WatchEmu — NES</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/watch-ui.css">
</head>
<body>
  <div class="lang-switch" id="langSwitch">
    <button class="lang-flag active" data-lang="pt" title="Portugues">PT</button>
    <button class="lang-flag" data-lang="en" title="English">EN</button>
  </div>
  <header>
    <p class="eyebrow">WatchEmu · NES</p>
    <h1 data-pt="Emulador NES para Smartwatch" data-en="NES Emulator for Smartwatch">Emulador NES para Smartwatch</h1>
    <p data-pt='Emulador NES com controles na tela otimizados para relogio redondo. Traga sua propria ROM <code>.nes</code>.'
       data-en='NES emulator with on-screen controls optimized for round watches. Bring your own <code>.nes</code> ROM.'>Emulador NES com controles na tela otimizados para relogio redondo. Traga sua propria ROM <code>.nes</code>.</p>
  </header>

  <div class="stage">
    <div class="watch" id="watch">
      <div class="case"></div>
      <button class="pusher pusher-rom" id="romBtn" aria-label="Trocar ROM">ROM</button>
      <div class="screen" id="screen">
        <canvas id="display" width="362" height="362"></canvas>
        <button class="face-btn face-a" id="btnA" aria-label="A">A</button>
        <button class="face-btn face-b" id="btnB" aria-label="B">B</button>
        <button class="side-btn side-select" id="btnSelect" aria-label="Select">SELECT</button>
        <button class="side-btn side-start" id="btnStart" aria-label="Start">START</button>
        <div class="bottom-controls" id="bottomControls">
          <div class="analog" id="analog" aria-label="Direcional">
            <div class="analog-base"></div>
            <div class="analog-stick" id="analogStick"></div>
          </div>
        </div>
        <div class="hint" id="hint">Toque em<br>"Carregar ROM"</div>
      </div>
    </div>
  </div>

  <input type="file" id="file" accept=".nes,.zip,application/zip" hidden>
  <div id="romInfo" hidden></div>
  <span id="fps" hidden></span>

  <div class="panel">
    <div class="legend">
      <h2 data-pt="Mapa de controle" data-en="Control map">Mapa de controle</h2>
      <div class="map"><span class="k">D-pad</span><span class="what" data-pt="<b>Mover</b> direcional na tela" data-en="<b>Move</b> on-screen d-pad"><b>Mover</b> direcional na tela</span><span class="tag" data-pt="toque" data-en="touch">toque</span></div>
      <div class="map"><span class="k">A</span><span class="what" data-pt="<b>A</b> pular" data-en="<b>A</b> jump"><b>A</b> pular</span><span class="tag" data-pt="toque" data-en="touch">toque</span></div>
      <div class="map"><span class="k">B</span><span class="what" data-pt="<b>B</b> acao — correr / atirar" data-en="<b>B</b> action — run / shoot"><b>B</b> acao — correr / atirar</span><span class="tag" data-pt="toque" data-en="touch">toque</span></div>
      <div class="map"><span class="k">SEL / ST</span><span class="what" data-pt="<b>Select / Start</b>" data-en="<b>Select / Start</b>"><b>Select / Start</b></span><span class="tag" data-pt="toque" data-en="touch">toque</span></div>
    </div>
  </div>

  <script src="../shared/fflate.min.js"></script>
  <script src="jsnes.min.js"></script>
  <script src="nes-app.js"></script>
  <script>
  (function(){
    var lang = "pt";
    document.getElementById("langSwitch").addEventListener("click", function(e){
      var btn = e.target.closest("[data-lang]");
      if (!btn || btn.dataset.lang === lang) return;
      lang = btn.dataset.lang;
      document.querySelectorAll(".lang-flag").forEach(function(f){ f.classList.toggle("active", f.dataset.lang === lang); });
      document.querySelectorAll("[data-"+lang+"]").forEach(function(el){
        var val = el.getAttribute("data-"+lang);
        if (val !== null) el.innerHTML = val;
      });
      document.documentElement.lang = lang === "pt" ? "pt-BR" : "en";
    });
  })();
  </script>
</body>
</html>
